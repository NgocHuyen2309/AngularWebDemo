<div class="user-list card shadow-lg border-0 rounded-4 overflow-hidden mb-4">
  <div class="user-list__header card-header p-3 p-xl-4 d-flex justify-content-between align-items-center gap-2">
    <div class="d-flex align-items-center gap-2 overflow-hidden">
      <h5 class="mb-0 fw-bold user-list__title text-truncate">Account Users</h5>
      <span class="user-list__badge badge flex-shrink-0">{{ users.length }}</span>
    </div>
    <button
      type="button"
      class="user-list__refresh-btn btn btn-sm d-flex align-items-center justify-content-center gap-1 flex-shrink-0"
      (click)="loadUsers()"
      [disabled]="loading"
      title="Refresh Users List"
    >
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      <span class="user-list__refresh-text">Refresh</span>
    </button>
  </div>

  <div class="user-list__body card-body p-4">
    <!-- Loading spinner -->
    <div *ngIf="loading && users.length === 0" class="text-center py-4">
      <div class="spinner-border text-warning" role="status">
        <span class="visually-hidden">Loading accounts...</span>
      </div>
      <p class="mt-2 mb-0 text-secondary small">Syncing accounts from DB...</p>
    </div>

    <!-- Error message -->
    <div *ngIf="error" class="alert alert-danger p-3 rounded-3 small mb-3">
      {{ error }}
    </div>

    <!-- Empty state -->
    <div *ngIf="!loading && users.length === 0 && !error" class="text-center py-4">
      <div class="user-list__empty-icon mb-2">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <p class="mb-0 text-secondary small">No registered accounts yet.<br>Register a new user above!</p>
    </div>

    <!-- Users table/list -->
    <div *ngIf="users.length > 0" class="user-list__items">
      <div *ngFor="let user of users" class="user-list__item p-3 mb-2 rounded-3 d-flex justify-content-between align-items-center">
        <div class="user-list__item-info overflow-hidden pe-2">
          <div class="d-flex align-items-center gap-2 mb-1">
            <span class="user-list__id fw-bold">#{{ user.id }}</span>
            <span class="user-list__email fw-semibold text-truncate">{{ user.email }}</span>
          </div>
          <div class="user-list__dob small d-flex align-items-center gap-1">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>DOB: {{ user.date_of_birth | date:'yyyy-MM-dd' }}</span>
          </div>
        </div>
        <button
          type="button"
          class="user-list__delete-btn btn btn-sm p-2 rounded-2"
          (click)="deleteUser(user.id)"
          title="Delete Account"
        >
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
