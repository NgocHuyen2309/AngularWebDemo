<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar__brand navbar-brand" routerLink="/home">
      <span class="starry-gradient-text fw-bold">{{ appTitle }}</span>
    </a>
    <button
      class="navbar__toggle navbar-toggler"
      type="button"
      (click)="toggleNavbar()"
      aria-controls="navbarContent"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div
      class="collapse navbar-collapse"
      id="navbarContent"
      [class.show]="!isCollapsed"
    >
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item" *ngIf="isLoggedIn">
          <a class="nav-link" routerLink="/home" routerLinkActive="active" (click)="toggleNavbar()">Home</a>
        </li>
        <li class="nav-item" *ngIf="isLoggedIn">
          <a class="nav-link" routerLink="/catalog" routerLinkActive="active" (click)="toggleNavbar()">Catalog</a>
        </li>
        <li class="nav-item" *ngIf="isLoggedIn && (userRole === 'admin' || userRole === 'super_admin')">
          <a class="nav-link" routerLink="/accounts" routerLinkActive="active" (click)="toggleNavbar()">All Accounts (Admin)</a>
        </li>
        <li class="nav-item dropdown" *ngIf="isLoggedIn" [class.show]="dropdownOpen">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-1" href="#" id="profileDropdown" role="button" (click)="toggleDropdown($event)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="fw-semibold">{{ currentUsername || (currentUserEmail ? currentUserEmail.split('@')[0] : 'My Profile') }}</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow" [class.show]="dropdownOpen" [style.right]="'0'" [style.left]="'auto'">
            <li>
              <a class="dropdown-item d-flex align-items-center gap-2 py-2" href="#" (click)="onEditProfile($event)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                <span>Edit Profile</span>
              </a>
            </li>
            <li>
              <a class="dropdown-item d-flex align-items-center gap-2 py-2" href="#" (click)="onChangePassword($event)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span>Change Password</span>
              </a>
            </li>
            <li><hr class="dropdown-divider my-1"></li>
            <li>
              <a class="dropdown-item text-danger d-flex align-items-center gap-2 py-2" href="#" (click)="onLogout($event)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Logout</span>
              </a>
            </li>
          </ul>
        </li>
        <li class="nav-item" *ngIf="!isLoggedIn">
          <a class="nav-link" routerLink="/login" [class.active]="!isLoginRoute" (click)="toggleNavbar()">Login / Register</a>
        </li>
        <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
          <button
            class="theme-toggle-btn d-flex align-items-center justify-content-center p-2 rounded-3 border-0"
            id="themeToggle"
            type="button"
            (click)="toggleTheme()"
            [attr.aria-label]="isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
            [title]="isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
          >
            <svg *ngIf="isDarkMode" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg *ngIf="!isDarkMode" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Các button chưa dùng thuộc tính pButton -->
