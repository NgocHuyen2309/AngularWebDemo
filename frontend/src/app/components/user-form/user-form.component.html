<div class="user-form card shadow-sm">
  <div class="card-header bg-primary text-white">
    <h5 class="mb-0">Register User</h5>
  </div>
  <div class="card-body">
    <form (submit)="onSubmit()">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="user-form__input form-control"
          [class.user-form__input--active]="email.length > 0"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          required
        />
      </div>
      <div class="mb-3">
        <label for="dateOfBirth" class="form-label">Date of Birth</label>
        <input
          type="date"
          id="dateOfBirth"
          class="user-form__input form-control"
          [class.user-form__input--active]="dateOfBirth.length > 0"
          [(ngModel)]="dateOfBirth"
          name="dateOfBirth"
          required
        />
      </div>
      <button type="submit" class="user-form__submit-btn btn btn-primary w-100">
        Register
      </button>
    </form>

    <!-- Success Card -->
    <div *ngIf="successMessage" class="user-form__success-card alert alert-success mt-3 mb-0">
      <strong>Success!</strong> {{ successMessage }}
      <div *ngIf="createdUser" class="mt-2">
        <small>
          <strong>Email:</strong> {{ createdUser.email }}<br />
          <strong>DOB:</strong> {{ createdUser.date_of_birth }}
        </small>
      </div>
    </div>

    <!-- Error Card -->
    <div *ngIf="errorMessage" class="user-form__error-card alert alert-danger mt-3 mb-0">
      <strong>Error!</strong> {{ errorMessage }}
    </div>
  </div>
</div>
