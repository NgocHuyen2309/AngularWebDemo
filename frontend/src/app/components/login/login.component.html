<div class="login-container fade-in-up">
  <div class="login-card shadow-lg">
    <div class="login-card__header">
      <h3 class="fw-bold mb-1"><span class="starry-gradient-text">Welcome to Crown & Velvet</span></h3>
      <p class="mb-0">Secure Enterprise Account & Catalog Management</p>
    </div>

    <div class="login-card__tabs d-flex gap-2 p-1.5 mb-3">
      <button
        type="button"
        class="login-card__tab-btn flex-fill py-2 rounded-2 fw-semibold"
        [class.login-card__tab-btn--active]="activeTab === 'login'"
        (click)="switchTab('login')"
      >
        Sign In
      </button>
      <button
        type="button"
        class="login-card__tab-btn flex-fill py-2 rounded-2 fw-semibold"
        [class.login-card__tab-btn--active]="activeTab === 'register'"
        (click)="switchTab('register')"
      >
        Register
      </button>
    </div>

    <div class="login-card__body">
      <!-- Sign In Tab -->
      <div *ngIf="activeTab === 'login'">
        <div *ngIf="errorMessage" class="login-card__error alert alert-danger d-flex align-items-center gap-2 mb-3 py-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <div class="small">{{ errorMessage }}</div>
        </div>

        <form (ngSubmit)="onLoginSubmit()">
          <!-- Username or Email Field -->
          <div class="form-group mb-3">
            <label class="form-label fw-semibold small mb-1">Username or Email <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control login-input"
              placeholder="Enter username or email (e.g. admin@enterprise.com)"
              [(ngModel)]="loginModel.identifier"
              name="login_identifier"
              required
            />
          </div>

          <!-- Password Field with Eye Toggle -->
          <div class="form-group mb-4">
            <label class="form-label fw-semibold small mb-1">Password <span class="text-danger">*</span></label>
            <div class="input-group password-group">
              <input
                [type]="showPassword ? 'text' : 'password'"
                class="form-control login-input"
                placeholder="Enter your secure password"
                [(ngModel)]="loginModel.password"
                name="login_password"
                required
              />
              <button
                type="button"
                class="btn btn-outline-secondary eye-btn d-flex align-items-center justify-content-center"
                (click)="togglePasswordVisibility()"
                title="Toggle password visibility"
              >
                <!-- Eye Icon -->
                <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <!-- Eye Slash Icon -->
                <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Compact, clean button layout right aligned or center fit -->
          <div class="d-flex justify-content-end">
            <button
              pButton
              pRipple
              type="submit"
              label="SIGN IN"
              [loading]="loading"
              class="login-card__submit-btn fw-bold px-5 py-2.5"
            ></button>
          </div>
        </form>
      </div>

      <!-- Register Tab -->
      <div *ngIf="activeTab === 'register'">
        <app-user-form></app-user-form>
      </div>
    </div>
  </div>
</div>
