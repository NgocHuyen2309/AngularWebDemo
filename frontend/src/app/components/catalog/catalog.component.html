<div class="catalog">
  <h2 class="catalog__title mb-4">Product Catalog</h2>

  <!-- Filter and Sort Controls -->
  <div class="catalog__controls d-flex flex-wrap align-items-center gap-3 mb-4">
    <div class="catalog__filters d-flex flex-wrap gap-2">
      <button
        *ngFor="let category of categories"
        class="catalog__filter-btn btn btn-sm"
        [class.catalog__filter-btn--active]="selectedCategory === category"
        [class.btn-primary]="selectedCategory === category"
        [class.btn-outline-primary]="selectedCategory !== category"
        (click)="filterByCategory(category)"
      >
        {{ category }}
      </button>
    </div>

    <div class="catalog__sort ms-auto">
      <p-select
        styleClass="catalog__sort-select"
        [options]="sortOptions"
        [ngModel]="sortBy"
        optionLabel="label"
        optionValue="value"
        (ngModelChange)="sortItems($event)"
      ></p-select>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="filteredItems.length === 0" class="catalog__empty alert alert-info">
    <p class="mb-0">No items found. Try adjusting your filters.</p>
  </div>

  <!-- Catalog Grid -->
  <div class="row g-4">
    <div *ngFor="let item of filteredItems" class="col-sm-6 col-md-4 col-lg-3">
      <div class="catalog__item h-100">
        <!-- Pristine Studio Header (Pure White Background for Seamless Product Photo Blending) -->
        <div class="catalog__item-image-box">
          <img
            [src]="item.imageUrl"
            [alt]="item.name"
            class="catalog__item-image"
            loading="lazy"
          />
        </div>
        <!-- Card Info Body -->
        <div class="catalog__item-body">
          <span class="catalog__item-category">{{ item.category }}</span>
          <h5 class="catalog__item-name">{{ item.name }}</h5>
          <p class="catalog__item-description">{{ item.description }}</p>
          <div class="catalog__item-footer">
            <span class="catalog__item-price">{{ item.price | currency:'USD' }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
