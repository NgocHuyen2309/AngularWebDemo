<!-- Global PrimeNG Toast Notifications -->
<p-toast position="top-right" [style]="{ zIndex: '1100' }"></p-toast>

<!-- Starry Night Van Gogh Animated Ambient Background Orbs -->
<div class="ambient-orb-container">
  <div class="ambient-orb ambient-orb--crescent"></div>
  <div class="ambient-orb ambient-orb--skies"></div>
  <div class="ambient-orb ambient-orb--starlight"></div>
</div>

<app-navbar
  [userRole]="userRole"
  [isLoggedIn]="isLoggedIn"
  [currentUserEmail]="currentUser ? currentUser.email : null"
  [currentUsername]="currentUser ? (currentUser.username || currentUser.email.split('@')[0]) : null"
  (logoutEvent)="handleLogout()"
  (editProfileEvent)="setProfileModalState(true)"
  (changePasswordEvent)="setChangePasswordModalState(true)"
></app-navbar>

<div class="app__container app__section" style="position: relative; z-index: 1;">
  <router-outlet></router-outlet>
</div>

<!-- Profile Edit Modal Overlay -->
<div *ngIf="showProfileModal" class="profile-modal-overlay" tabindex="-1" role="dialog" aria-modal="true">
  <div class="profile-modal-box fade-in-up" role="document">
    <app-user-form
      [isModal]="true"
      [isEditMode]="true"
      [editUserId]="currentUser ? currentUser.id : null"
      (closeModalEvent)="setProfileModalState(false)"
      (userUpdated)="onProfileUpdated($event)"
    ></app-user-form>
  </div>
</div>

<!-- Change Password Modal Overlay -->
<div *ngIf="showChangePasswordModal" class="profile-modal-overlay" tabindex="-1" role="dialog" aria-modal="true">
  <div class="profile-modal-box fade-in-up" role="document">
    <app-change-password-modal
      [userId]="currentUser ? currentUser.id : null"
      (closeModalEvent)="setChangePasswordModalState(false)"
    ></app-change-password-modal>
  </div>
</div>
